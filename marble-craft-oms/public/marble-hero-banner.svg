<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Marble slab 1: Statuario white -->
    <filter id="marble-noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.025" numOctaves="4" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="14" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="slab1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f0ece4"/>
      <stop offset="40%"  stop-color="#e8e2d8"/>
      <stop offset="70%"  stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#ede6db"/>
    </linearGradient>
    <linearGradient id="slab2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2a2a2a"/>
      <stop offset="40%"  stop-color="#1e1e1e"/>
      <stop offset="70%"  stop-color="#333333"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
    <linearGradient id="slab3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"   stop-color="#d4c4a0"/>
      <stop offset="50%"  stop-color="#c8b488"/>
      <stop offset="100%" stop-color="#d0be98"/>
    </linearGradient>
    <linearGradient id="slab4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#b0b0b0"/>
      <stop offset="50%"  stop-color="#989898"/>
      <stop offset="100%" stop-color="#a8a8a8"/>
    </linearGradient>
  </defs>

  <!-- Marble tile grid layout -->
  <!-- Row 1 -->
  <rect x="0"   y="0"  width="200" height="80" fill="url(#slab1)" filter="url(#marble-noise)"/>
  <rect x="200" y="0"  width="200" height="80" fill="url(#slab2)" filter="url(#marble-noise)"/>
  <rect x="400" y="0"  width="200" height="80" fill="url(#slab3)" filter="url(#marble-noise)"/>
  <rect x="600" y="0"  width="200" height="80" fill="url(#slab4)" filter="url(#marble-noise)"/>

  <!-- Row 2 (offset pattern) -->
  <rect x="0"   y="80" width="200" height="80" fill="url(#slab3)" filter="url(#marble-noise)"/>
  <rect x="200" y="80" width="200" height="80" fill="url(#slab1)" filter="url(#marble-noise)"/>
  <rect x="400" y="80" width="200" height="80" fill="url(#slab2)" filter="url(#marble-noise)"/>
  <rect x="600" y="80" width="200" height="80" fill="url(#slab1)" filter="url(#marble-noise)"/>

  <!-- Grout lines -->
  <line x1="200" y1="0"   x2="200" y2="160" stroke="#c8bfb0" stroke-width="2"/>
  <line x1="400" y1="0"   x2="400" y2="160" stroke="#c8bfb0" stroke-width="2"/>
  <line x1="600" y1="0"   x2="600" y2="160" stroke="#c8bfb0" stroke-width="2"/>
  <line x1="0"   y1="80"  x2="800" y2="80"  stroke="#c8bfb0" stroke-width="2"/>

  <!-- Dark overlay for text readability -->
  <rect x="0" y="0" width="800" height="160" fill="rgba(26,46,74,0.62)"/>
</svg>
