name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore MarbleCraftOMS.sln

      - name: Build
        run: dotnet build MarbleCraftOMS.sln --no-restore --configuration Release

      - name: Unit Tests
        run: dotnet test tests/MarbleCraftOMS.UnitTests/MarbleCraftOMS.UnitTests.csproj --no-build --configuration Release --logger "console;verbosity=normal"

      - name: Integration Tests
        run: dotnet test tests/MarbleCraftOMS.IntegrationTests/MarbleCraftOMS.IntegrationTests.csproj --no-build --configuration Release --logger "console;verbosity=normal"
